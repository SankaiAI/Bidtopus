# Railway deploy config for backend.
# https://docs.railway.app/reference/config-as-code
#
# Why --workers 1: the in-memory event_bus (per-contract SSE pub/sub) and the
# in-memory slowapi rate limiter both fail across workers — SSE subscribers on
# worker A miss events from worker B, and rate counters become per-worker.
# Until those move to Redis (security review item L-5), keep one worker.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/health"
healthcheckTimeout = 30
