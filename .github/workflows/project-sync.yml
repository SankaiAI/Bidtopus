name: Auto-add issues to project board
on:
  issues:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v0.5.0
        with:
          project-url: https://github.com/users/SankaiAI/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}
