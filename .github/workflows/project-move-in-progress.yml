name: Move issue to In Progress

on:
  issues:
    types: [labeled]

jobs:
  move-to-in-progress:
    if: github.event.label.name == 'status: in-progress'
    runs-on: ubuntu-latest
    steps:
      - name: Move issue to In Progress column
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const PROJECT_NUMBER = 2;
            const OWNER = 'SankaiAI';
            const issueNodeId = context.payload.issue.node_id;

            // Get project ID and Status field metadata
            const { user } = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner: OWNER, number: PROJECT_NUMBER });

            const project = user.projectV2;
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            if (!statusField) { core.setFailed('Status field not found in project'); return; }

            const inProgressOption = statusField.options.find(o => o.name === 'In Progress');
            if (!inProgressOption) { core.setFailed('"In Progress" option not found in Status field'); return; }

            // Find the project item linked to this issue
            const { node } = await github.graphql(`
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }
            `, { issueId: issueNodeId });

            const projectItem = node.projectItems.nodes.find(
              item => item.project.id === project.id
            );

            if (!projectItem) {
              core.warning('Issue not found in project yet — auto-add may not have run. Skipping.');
              return;
            }

            // Set Status to In Progress
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId: project.id,
              itemId: projectItem.id,
              fieldId: statusField.id,
              optionId: inProgressOption.id,
            });

            console.log(`Issue #${context.payload.issue.number} moved to In Progress`);
